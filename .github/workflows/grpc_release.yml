name: LocalSend gRPC Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.17.0)'
        required: true

env:
  FLUTTER_VERSION: "3.35.6"
  RUST_VERSION: "1.84.1"

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────
  # 1. Generate proto code & version
  # ─────────────────────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION=${{ github.event.inputs.version }}
          else
            VERSION=${GITHUB_REF#refs/tags/}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '25.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Dart protoc plugin
        run: dart pub global activate protoc_plugin

      - name: Generate gRPC Dart code
        run: |
          mkdir -p common/lib/src/generated
          protoc \
            --dart_out=grpc:common/lib/src/generated \
            -I proto \
            proto/localsend.proto

      - name: Upload generated proto files
        uses: actions/upload-artifact@v4
        with:
          name: proto-generated
          path: common/lib/src/generated/
          retention-days: 1

  # ─────────────────────────────────────────────
  # 2. Android APK
  # ─────────────────────────────────────────────
  build_apk:
    needs: prepare
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Download generated proto
        uses: actions/download-artifact@v4
        with:
          name: proto-generated
          path: common/lib/src/generated/

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            app/rust/target
          key: cargo-android-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache Flutter pub
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: flutter-pub-${{ hashFiles('**/pubspec.lock') }}

      - name: Flutter pub get
        working-directory: app
        run: flutter pub get

      - name: Build APK (split per ABI)
        working-directory: app
        run: flutter build apk --split-per-abi --release

      - name: Rename APKs
        run: |
          VERSION=${{ needs.prepare.outputs.version }}
          for f in app/build/app/outputs/flutter-apk/app-*-release.apk; do
            base=$(basename "$f" .apk)
            mv "$f" "app/build/app/outputs/flutter-apk/localsend-grpc-${VERSION}-${base#app-}.apk"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: app/build/app/outputs/flutter-apk/localsend-grpc-*.apk
          retention-days: 1

  # ─────────────────────────────────────────────
  # 3. Linux x86_64 tar.gz
  # ─────────────────────────────────────────────
  build_linux:
    needs: prepare
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Download generated proto
        uses: actions/download-artifact@v4
        with:
          name: proto-generated
          path: common/lib/src/generated/

      - name: Install Linux deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            app/rust/target
          key: cargo-linux-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache Flutter pub
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: flutter-pub-${{ hashFiles('**/pubspec.lock') }}

      - name: Flutter pub get
        working-directory: app
        run: flutter pub get

      - name: Build Linux
        working-directory: app
        run: flutter build linux --release

      - name: Package tar.gz
        run: |
          VERSION=${{ needs.prepare.outputs.version }}
          cd app/build/linux/x64/release/bundle
          tar -czf "/tmp/localsend-grpc-${VERSION}-linux-x86_64.tar.gz" .
          mv "/tmp/localsend-grpc-${VERSION}-linux-x86_64.tar.gz" $GITHUB_WORKSPACE/

      - uses: actions/upload-artifact@v4
        with:
          name: linux-tar
          path: localsend-grpc-*-linux-x86_64.tar.gz
          retention-days: 1

  # ─────────────────────────────────────────────
  # 4. Windows x86_64 zip
  # ─────────────────────────────────────────────
  build_windows:
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download generated proto
        uses: actions/download-artifact@v4
        with:
          name: proto-generated
          path: common/lib/src/generated/

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            app/rust/target
          key: cargo-windows-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache Flutter pub
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: flutter-pub-${{ hashFiles('**/pubspec.lock') }}

      - name: Flutter pub get
        working-directory: app
        run: flutter pub get

      - name: Build Windows
        working-directory: app
        run: flutter build windows --release

      - name: Package zip
        shell: pwsh
        run: |
          $VERSION = "${{ needs.prepare.outputs.version }}"
          $src = "app\build\windows\x64\runner\Release"
          $out = "localsend-grpc-$VERSION-windows-x86_64.zip"
          Compress-Archive -Path "$src\*" -DestinationPath $out

      - uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: localsend-grpc-*-windows-x86_64.zip
          retention-days: 1

  # ─────────────────────────────────────────────
  # 5. macOS dmg
  # ─────────────────────────────────────────────
  build_macos:
    needs: prepare
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download generated proto
        uses: actions/download-artifact@v4
        with:
          name: proto-generated
          path: common/lib/src/generated/

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            app/rust/target
          key: cargo-macos-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache Flutter pub
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: flutter-pub-${{ hashFiles('**/pubspec.lock') }}

      - name: Flutter pub get
        working-directory: app
        run: flutter pub get

      - name: Build macOS
        working-directory: app
        run: flutter build macos --release

      - name: Package dmg
        run: |
          VERSION=${{ needs.prepare.outputs.version }}
          APP_PATH="app/build/macos/Build/Products/Release/LocalSend.app"
          OUT="localsend-grpc-${VERSION}-macos.dmg"
          hdiutil create -volname "LocalSend gRPC" -srcfolder "$APP_PATH" -ov -format UDZO "$OUT"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: localsend-grpc-*-macos.dmg
          retention-days: 1

  # ─────────────────────────────────────────────
  # 6. Rust core library (all platforms)
  # ─────────────────────────────────────────────
  build_rust_core:
    needs: prepare
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: windows-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            core/target
          key: cargo-core-${{ matrix.target }}-${{ hashFiles('core/Cargo.lock') }}

      - name: Build Rust core
        working-directory: core
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package core library
        shell: bash
        run: |
          VERSION=${{ needs.prepare.outputs.version }}
          TARGET=${{ matrix.target }}
          SUFFIX=${{ matrix.suffix }}
          mkdir -p dist
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp core/target/${TARGET}/release/localsend.exe dist/ 2>/dev/null || \
            cp core/target/${TARGET}/release/*.dll dist/ 2>/dev/null || true
            cd dist && 7z a "../localsend-grpc-core-${VERSION}-${SUFFIX}.zip" . && cd ..
          else
            cp core/target/${TARGET}/release/localsend dist/ 2>/dev/null || \
            cp core/target/${TARGET}/release/liblocalsend.* dist/ 2>/dev/null || true
            tar -czf "localsend-grpc-core-${VERSION}-${SUFFIX}.tar.gz" -C dist .
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: rust-core-${{ matrix.suffix }}
          path: localsend-grpc-core-*
          retention-days: 1

  # ─────────────────────────────────────────────
  # 7. Create GitHub Release
  # ─────────────────────────────────────────────
  release:
    needs:
      - prepare
      - build_apk
      - build_linux
      - build_windows
      - build_macos
      - build_rust_core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: List release assets
        run: ls -lh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          name: "LocalSend gRPC ${{ needs.prepare.outputs.version }}"
          body: |
            ## LocalSend gRPC ${{ needs.prepare.outputs.version }}

            This release includes the LocalSend app with the HTTP transport layer replaced by **gRPC** for faster file transfers.

            ### Downloads
            | Platform | File |
            |---|---|
            | Android | `localsend-grpc-*-arm64-v8a-release.apk` (recommended) |
            | Android (32-bit) | `localsend-grpc-*-armeabi-v7a-release.apk` |
            | Android (x86_64) | `localsend-grpc-*-x86_64-release.apk` |
            | Linux x86_64 | `localsend-grpc-*-linux-x86_64.tar.gz` |
            | Windows x86_64 | `localsend-grpc-*-windows-x86_64.zip` |
            | macOS | `localsend-grpc-*-macos.dmg` |
            | Rust core (Linux) | `localsend-grpc-core-*-linux-x86_64.tar.gz` |
            | Rust core (Windows) | `localsend-grpc-core-*-windows-x86_64.zip` |
            | Rust core (macOS) | `localsend-grpc-core-*-macos-arm64.tar.gz` |

            ### Changes from upstream
            - HTTP file transfer replaced with gRPC streaming
            - Proto definition: `proto/localsend.proto`
            - gRPC client: `common/lib/src/grpc/grpc_client.dart`
            - gRPC server: `common/lib/src/grpc/grpc_server.dart`
          files: dist/*
          draft: false
          prerelease: false
          generate_release_notes: false
